[build]
  command = "hugo --minify"
  publish = "public"

[build.environment]
  HUGO_VERSION = "0.153.0"
  HUGO_ENABLEGITINFO = "true"
  HUGO_EXTENDED = "true"

[[redirects]]
  from = "/nl/*"
  to = "/:splat"
  status = 301

[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
